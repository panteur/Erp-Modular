version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: erp-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Panteur7899968@
      MYSQL_DATABASE: erp_modular
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data: